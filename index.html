<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Scolastico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --surface2: #252420; --surface3: #2e2c28;
    --border: #3a3830; --accent: #e8c97d; --accent2: #c5a24e;
    --text: #f0ece0; --text2: #9a9485; --text3: #6a6458;
    --danger: #e05c5c; --success: #6db88a; --info: #6b9fd4; --radius: 10px;
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; padding: 40px; overflow-y: auto; max-width: 900px; }

  .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h1 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--accent); line-height: 1.2; }
  .sidebar-logo span { color: var(--text2); font-size: 11px; display: block; margin-top: 4px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); padding: 0 12px; margin: 16px 0 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; cursor: pointer; transition: all 0.15s; color: var(--text2); font-size: 13px; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface3); color: var(--accent); }
  .nav-item svg { flex-shrink: 0; opacity: 0.7; }
  .nav-item.active svg { opacity: 1; }
  .module-nav-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 7px; cursor: pointer; transition: all 0.15s; color: var(--text2); font-size: 12px; border: none; background: none; width: 100%; text-align: left; }
  .module-nav-item:hover { background: var(--surface2); color: var(--text); }
  .module-nav-item.active { background: var(--surface3); color: var(--accent); }
  .module-nav-item .mod-avg { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 1px 6px; border-radius: 4px; }
  .module-nav-item.active .mod-avg { background: var(--bg); color: var(--accent2); }

  .db-status { display: flex; align-items: center; gap: 6px; padding: 10px 16px; margin: 8px 12px; border-radius: 7px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all 0.15s; }
  .db-status:hover { border-color: var(--accent2); color: var(--text); }
  .db-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .db-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .db-dot.disconnected { background: var(--danger); }
  .db-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; }
  .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); }
  .page-subtitle { color: var(--text2); font-size: 12px; margin-top: 4px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 14px; font-weight: 500; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
  .stat-value { font-size: 26px; font-weight: 300; color: var(--text); margin: 4px 0 2px; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text2); }
  .stat-card.accent { border-color: var(--accent2); }
  .stat-card.accent .stat-value { color: var(--accent); }
  .stat-card.danger .stat-value { color: var(--danger); }

  .progress-bar { height: 6px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin: 8px 0 2px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
  .progress-fill.danger { background: linear-gradient(90deg, #c04444, var(--danger)); }

  .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .grade-high { background: rgba(109,184,138,0.15); color: var(--success); border: 1px solid rgba(109,184,138,0.3); }
  .grade-mid  { background: rgba(232,201,125,0.12); color: var(--accent);  border: 1px solid rgba(232,201,125,0.25); }
  .grade-low  { background: rgba(224,92,92,0.12);  color: var(--danger);  border: 1px solid rgba(224,92,92,0.25); }
  .grades-list { display: flex; flex-direction: column; gap: 8px; }
  .grade-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
  .grade-row-info { flex: 1; }
  .grade-row-desc { font-size: 12px; color: var(--text); }
  .grade-row-date { font-size: 10px; color: var(--text3); }
  .grade-delete { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 4px; transition: color 0.15s; }
  .grade-delete:hover { color: var(--danger); }

  .absence-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 8px; }
  .absence-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 8px; border-radius: 4px; background: rgba(107,159,212,0.12); color: var(--info); border: 1px solid rgba(107,159,212,0.2); min-width: 90px; text-align: center; }

  .form-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }
  input[type="text"],input[type="number"],input[type="date"],input[type="password"],select {
    background: var(--surface3); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  input:focus,select:focus { border-color: var(--accent2); }
  input[type="number"] { width: 80px; }
  select { min-width: 150px; cursor: pointer; }
  .btn { padding: 9px 16px; border-radius: 7px; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; transition: all 0.15s; letter-spacing: 0.02em; }
  .btn-primary { background: var(--accent); color: #1a1812; }
  .btn-primary:hover { background: #f0d88a; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(224,92,92,0.15); color: var(--danger); border: 1px solid rgba(224,92,92,0.3); }
  .btn-danger:hover { background: rgba(224,92,92,0.25); }
  .btn-sm { padding: 6px 12px; font-size: 11px; }
  .btn:disabled { opacity:0.45; cursor:not-allowed; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 6px; color: var(--text); }
  .modal-subtitle { color: var(--text3); font-size: 12px; margin-bottom: 20px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* SETUP */
  .setup-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; overflow-y: auto; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 540px; max-width: 100%; }
  .setup-logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--accent); margin-bottom: 6px; }
  .setup-desc { color: var(--text3); font-size: 12px; line-height: 1.7; margin-bottom: 28px; }
  .setup-step { display: flex; gap: 12px; margin-bottom: 16px; }
  .setup-step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent2); color: #1a1812; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .setup-step-text { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .setup-step-text strong { color: var(--text); }
  .setup-step-text a { color: var(--accent2); text-decoration: none; }
  .setup-step-text a:hover { text-decoration: underline; }
  .setup-divider { height: 1px; background: var(--border); margin: 24px 0; }
  .setup-field { margin-bottom: 12px; }
  .setup-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 5px; }
  .setup-field input { width: 100%; }
  .setup-error { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); color: var(--danger); padding: 10px 14px; border-radius: 7px; font-size: 12px; margin-bottom: 14px; }
  .setup-skip { font-size: 11px; color: var(--text3); text-align: center; margin-top: 12px; cursor: pointer; }
  .setup-skip:hover { color: var(--text2); text-decoration: underline; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state p { font-size: 12px; }
  .avg-display { display: inline-flex; align-items: baseline; gap: 4px; }
  .avg-display .big { font-size: 32px; font-weight: 300; }
  .avg-display .small { font-size: 14px; color: var(--text3); }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; border-radius: 8px; font-size: 12px; z-index: 999; animation: slideUp 0.2s ease; max-width: 320px; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,0.2); border-top-color:currentColor; border-radius:50%; animation:spinA 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spinA { to{transform:rotate(360deg)} }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  @media(max-width:768px){.app{flex-direction:column}.sidebar{width:100%;height:auto;position:static}.main{padding:20px}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp, getApps, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import React from 'https://esm.sh/react@18.2.0';
import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

const { useState, useEffect, useRef, useMemo } = React;

// ── PERSISTENCE ────────────────────────────────────────────────
const CFG_KEY = 'reg_fb_cfg';
const LOC_KEY = 'reg_local_v1';
const loadCfg  = () => { try { const r=localStorage.getItem(CFG_KEY); return r?JSON.parse(r):null; } catch(e){ return null; } };
const saveCfg  = c => localStorage.setItem(CFG_KEY, JSON.stringify(c));
const clearCfg = () => localStorage.removeItem(CFG_KEY);
const loadLocal = () => { try { const r=localStorage.getItem(LOC_KEY); return r?JSON.parse(r):{modules:[],absences:[]}; } catch(e){ return {modules:[],absences:[]}; } };
const saveLocal = d => { try { localStorage.setItem(LOC_KEY, JSON.stringify(d)); } catch(e){} };

// ── UTILS ──────────────────────────────────────────────────────
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const calcAvg = gs => (!gs||!gs.length) ? null : gs.reduce((s,g)=>s+g.value,0)/gs.length;
const gradeClass = v => v===null?'':v>=7?'grade-high':v>=6?'grade-mid':'grade-low';
const fmtAvg = v => v===null?'—':v.toFixed(2);
const fmtMin = m => { const h=Math.floor(m/60),min=m%60; return min>0?`${h}h ${min}m`:`${h}h`; };

// ── SVG ICON ───────────────────────────────────────────────────
const Icon = ({d,size=16}) => React.createElement('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},React.createElement('path',{d}));
const I = {
  home:  'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10',
  clock: 'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 5v5l3 3',
  plus:  'M12 5v14M5 12h14',
  trash: 'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6',
  gear:  'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z',
};

// ── TOAST ──────────────────────────────────────────────────────
function Toast({msg,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2500);return()=>clearTimeout(t);},[]);
  return React.createElement('div',{className:'toast'},msg);
}

// ── SETUP ──────────────────────────────────────────────────────
function SetupScreen({onSave,onSkip}) {
  const [apiKey,    setApiKey]    = useState('');
  const [projectId, setProjectId] = useState('');
  const [appId,     setAppId]     = useState('');
  const [error,     setError]     = useState('');
  const [busy,      setBusy]      = useState(false);

  async function handleSave() {
    if (!apiKey.trim()||!projectId.trim()||!appId.trim()) { setError('Compila tutti i campi.'); return; }
    setError(''); setBusy(true);
    try {
      // Clean up any existing test app
      const existing = getApps().find(a=>a.name==='__test__');
      if (existing) await deleteApp(existing);
      const testApp = initializeApp({apiKey:apiKey.trim(),projectId:projectId.trim(),appId:appId.trim()},'__test__');
      const db = getFirestore(testApp);
      await getDoc(doc(db,'__ping__','ping')).catch(()=>{});
      await deleteApp(testApp);
      const cfg = {apiKey:apiKey.trim(),projectId:projectId.trim(),appId:appId.trim()};
      saveCfg(cfg); onSave(cfg);
    } catch(e) {
      setError('Errore: '+(e.message||'controlla le credenziali.'));
    } finally { setBusy(false); }
  }

  const field = (label,val,set,type='text',ph='') =>
    React.createElement('div',{className:'setup-field'},
      React.createElement('label',null,label),
      React.createElement('input',{type,placeholder:ph,value:val,onChange:e=>set(e.target.value),onKeyDown:e=>e.key==='Enter'&&handleSave()})
    );

  return React.createElement('div',{className:'setup-screen'},
    React.createElement('div',{className:'setup-card'},
      React.createElement('div',{className:'setup-logo'},'Registro'),
      React.createElement('p',{className:'setup-desc'},'Collega Firebase Firestore per sincronizzare i dati su tutti i tuoi dispositivi. È completamente gratuito con il piano Spark di Firebase.'),

      React.createElement('div',{className:'setup-step'},
        React.createElement('div',{className:'setup-step-num'},'1'),
        React.createElement('div',{className:'setup-step-text'},
          React.createElement('strong',null,'Crea un progetto Firebase'),React.createElement('br'),
          'Vai su ',React.createElement('a',{href:'https://console.firebase.google.com',target:'_blank'},'console.firebase.google.com'),
          ' → "Add project" → inserisci un nome → continua.'
        )
      ),
      React.createElement('div',{className:'setup-step'},
        React.createElement('div',{className:'setup-step-num'},'2'),
        React.createElement('div',{className:'setup-step-text'},
          React.createElement('strong',null,'Abilita Firestore Database'),React.createElement('br'),
          'Menu laterale → Build → Firestore Database → "Create database" → scegli ',
          React.createElement('strong',null,'Start in test mode'),' → Done.'
        )
      ),
      React.createElement('div',{className:'setup-step'},
        React.createElement('div',{className:'setup-step-num'},'3'),
        React.createElement('div',{className:'setup-step-text'},
          React.createElement('strong',null,'Ottieni le credenziali Web'),React.createElement('br'),
          'Icona ⚙ (Project Settings) → tab "General" → scorri fino a "Your apps" → clicca ',
          React.createElement('strong',null,'</> (Web)'),' → registra app → copia i valori qui sotto.'
        )
      ),

      React.createElement('div',{className:'setup-divider'}),
      React.createElement('div',{style:{fontSize:11,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:14}},'Incolla le credenziali'),

      error && React.createElement('div',{className:'setup-error'},error),

      field('apiKey', apiKey, setApiKey, 'password', 'AIzaSy...'),
      field('projectId', projectId, setProjectId, 'text', 'nome-progetto-abc12'),
      field('appId', appId, setAppId, 'text', '1:123456789012:web:abcdef123456'),

      React.createElement('button',{className:'btn btn-primary',style:{width:'100%',marginTop:8},onClick:handleSave,disabled:busy},
        busy ? React.createElement('span',null,React.createElement('span',{className:'spin'}),'Verifica...') : 'Connetti Firebase'
      ),
      React.createElement('div',{className:'setup-skip',onClick:onSkip},'Salta per ora — salva solo nel browser')
    )
  );
}

// ── APP ────────────────────────────────────────────────────────
function App() {
  const [cfg,        setCfg]        = useState(loadCfg);
  const [showSetup,  setShowSetup]  = useState(()=>!loadCfg());
  const [db,         setDb]         = useState(null);
  const [dbStatus,   setDbStatus]   = useState('disconnected');
  const [data,       setData]       = useState(loadLocal);
  const [view,       setView]       = useState('home');
  const [modal,      setModal]      = useState(null);
  const [toast,      setToast]      = useState(null);
  const [pendingDel, setPendingDel] = useState(null);
  const unsubRef = useRef([]);

  // Form
  const [modName,   setModName]   = useState('');
  const [gradeVal,  setGradeVal]  = useState('');
  const [gradeDesc, setGradeDesc] = useState('');
  const [gradeDate, setGradeDate] = useState(()=>new Date().toISOString().slice(0,10));
  const [absType,   setAbsType]   = useState('full');
  const [absH,      setAbsH]      = useState('');
  const [absM,      setAbsM]      = useState('');
  const [absDate,   setAbsDate]   = useState(()=>new Date().toISOString().slice(0,10));
  const [absNote,   setAbsNote]   = useState('');

  const showToast = msg => setToast(msg);

  // ── FIREBASE INIT ──────────────────────────────────────────
  function stopListeners() { unsubRef.current.forEach(fn=>fn()); unsubRef.current=[]; }

  function initFirebase(config) {
    stopListeners();
    setDbStatus('loading');
    try {
      const existing = getApps().find(a=>a.name==='registro');
      const app = existing || initializeApp(config,'registro');
      const firestore = getFirestore(app);
      setDb(firestore);

      const u1 = onSnapshot(collection(firestore,'modules'),
        snap => {
          const modules = snap.docs.map(d=>({id:d.id,...d.data()}));
          setData(prev=>{ const n={...prev,modules}; saveLocal(n); return n; });
          setDbStatus('connected');
        },
        ()=>setDbStatus('disconnected')
      );
      const u2 = onSnapshot(collection(firestore,'absences'),
        snap => {
          const absences = snap.docs.map(d=>({id:d.id,...d.data()}));
          setData(prev=>{ const n={...prev,absences}; saveLocal(n); return n; });
        }
      );
      unsubRef.current = [u1,u2];
    } catch(e) {
      setDbStatus('disconnected');
      showToast('Errore Firebase: '+e.message);
    }
  }

  useEffect(()=>{ if(cfg) initFirebase(cfg); return stopListeners; },[]);

  // ── COMPUTED ──────────────────────────────────────────────
  const totalAbsMin  = useMemo(()=>data.absences.reduce((s,a)=>s+a.minutes,0),[data.absences]);
  const totalAbsH    = totalAbsMin/60;
  const absPct       = Math.min((totalAbsH/200)*100,100);
  const overallAvg   = useMemo(()=>calcAvg(data.modules.flatMap(m=>m.grades||[])),[data.modules]);
  const currentMod   = useMemo(()=>data.modules.find(m=>m.id===view),[data.modules,view]);

  // ── DB HELPERS ────────────────────────────────────────────
  async function fsSet(coll,id,obj)      { if(db) await setDoc(doc(db,coll,id),obj); }
  async function fsDel(coll,id)          { if(db) await deleteDoc(doc(db,coll,id)); }
  async function fsUpd(coll,id,fields)   { if(db) await updateDoc(doc(db,coll,id),fields); }

  function localUpdate(updater) { setData(d=>{ const n=updater(d); saveLocal(n); return n; }); }

  // ── ACTIONS ───────────────────────────────────────────────
  async function addModule() {
    if (!modName.trim()) return;
    const id = uid();
    const m  = {id,name:modName.trim(),grades:[],createdAt:Date.now()};
    if (db) await fsSet('modules',id,m);
    else    localUpdate(d=>({...d,modules:[...d.modules,m]}));
    setModName(''); setModal(null); setView(id);
    showToast(`Modulo "${m.name}" aggiunto`);
  }

  async function deleteModule(id) {
    if (db) await fsDel('modules',id);
    else    localUpdate(d=>({...d,modules:d.modules.filter(m=>m.id!==id)}));
    setModal(null); setPendingDel(null);
    if (view===id) setView('home');
    showToast('Modulo eliminato');
  }

  async function addGrade() {
    const val=parseFloat(gradeVal);
    if (isNaN(val)||val<1||val>100||!Number.isInteger(val)) return;
    const grade={id:uid(),value:val,desc:gradeDesc.trim(),date:gradeDate};
    const mod=data.modules.find(m=>m.id===view); if(!mod) return;
    const newGrades=[...(mod.grades||[]),grade];
    if (db) await fsUpd('modules',view,{grades:newGrades});
    else    localUpdate(d=>({...d,modules:d.modules.map(m=>m.id===view?{...m,grades:newGrades}:m)}));
    setGradeVal(''); setGradeDesc(''); setModal(null);
    showToast('Voto aggiunto');
  }

  async function deleteGrade(modId,gradeId) {
    const mod=data.modules.find(m=>m.id===modId); if(!mod) return;
    const newGrades=(mod.grades||[]).filter(g=>g.id!==gradeId);
    if (db) await fsUpd('modules',modId,{grades:newGrades});
    else    localUpdate(d=>({...d,modules:d.modules.map(m=>m.id===modId?{...m,grades:newGrades}:m)}));
  }

  async function addAbsence() {
    let minutes=0;
    if      (absType==='full')  minutes=480;
    else if (absType==='half')  minutes=240;
    else { minutes=(parseInt(absH)||0)*60+(parseInt(absM)||0); }
    if (minutes<=0) return;
    const id=uid(); const abs={id,type:absType,minutes,date:absDate,note:absNote.trim()};
    if (db) await fsSet('absences',id,abs);
    else    localUpdate(d=>({...d,absences:[...d.absences,abs]}));
    setAbsH(''); setAbsM(''); setAbsNote(''); setModal(null);
    showToast('Assenza registrata');
  }

  async function deleteAbsence(id) {
    if (db) await fsDel('absences',id);
    else    localUpdate(d=>({...d,absences:d.absences.filter(a=>a.id!==id)}));
  }

  function handleSetupSave(config) {
    setCfg(config); setShowSetup(false); initFirebase(config);
    showToast('🔥 Firebase connesso!');
  }

  function disconnectFirebase() {
    stopListeners(); setDb(null); setCfg(null); clearCfg(); setDbStatus('disconnected');
    showToast('Disconnesso da Firebase');
  }

  // ── SIDEBAR ───────────────────────────────────────────────
  const statusLabel = dbStatus==='connected'?'Firebase sync':dbStatus==='loading'?'Connessione...':'Solo locale';
  function Sidebar() {
    return React.createElement('aside',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},
        React.createElement('h1',null,'Registro'),
        React.createElement('span',null,'Anno scolastico 2024/25')
      ),
      React.createElement('nav',{className:'sidebar-nav'},
        React.createElement('div',{className:'nav-label'},'Generale'),
        React.createElement('button',{className:`nav-item ${view==='home'?'active':''}`,onClick:()=>setView('home')},
          React.createElement(Icon,{d:I.home}),'Dashboard'
        ),
        React.createElement('button',{className:`nav-item ${view==='absences'?'active':''}`,onClick:()=>setView('absences')},
          React.createElement(Icon,{d:I.clock}),'Assenze'
        ),
        React.createElement('div',{className:'nav-label'},`Moduli (${data.modules.length})`),
        ...data.modules.map(m=>{
          const avg=calcAvg(m.grades);
          return React.createElement('button',{key:m.id,className:`module-nav-item ${view===m.id?'active':''}`,onClick:()=>setView(m.id)},
            React.createElement('span',null,m.name),
            React.createElement('span',{className:'mod-avg'},fmtAvg(avg))
          );
        }),
        React.createElement('button',{className:'nav-item',style:{marginTop:4},onClick:()=>{setModal('addModule');setModName('');}},
          React.createElement(Icon,{d:I.plus}),'Nuovo modulo'
        )
      ),
      React.createElement('div',{style:{padding:'0 12px 16px'}},
        React.createElement('div',{className:'db-status',onClick:()=>setModal('dbSettings')},
          React.createElement('span',{className:`db-dot ${dbStatus}`}),
          React.createElement('span',null,statusLabel),
          React.createElement('span',{style:{marginLeft:'auto'}},React.createElement(Icon,{d:I.gear,size:12}))
        )
      )
    );
  }

  // ── HOME ──────────────────────────────────────────────────
  function HomeView() {
    return React.createElement('div',null,
      React.createElement('div',{className:'page-header'},
        React.createElement('div',null,
          React.createElement('h2',{className:'page-title'},'Dashboard'),
          React.createElement('p',{className:'page-subtitle'},`${data.modules.length} moduli · ${data.absences.length} assenze`)
        )
      ),
      React.createElement('div',{className:'stats-row'},
        React.createElement('div',{className:`stat-card ${overallAvg!==null?(overallAvg>=6?'accent':'danger'):''}`},
          React.createElement('div',{className:'stat-label'},'Media Generale'),
          React.createElement('div',{className:'stat-value'},fmtAvg(overallAvg)),
          React.createElement('div',{className:'stat-sub'},'su tutti i moduli')
        ),
        React.createElement('div',{className:'stat-card'},
          React.createElement('div',{className:'stat-label'},'Moduli'),
          React.createElement('div',{className:'stat-value'},data.modules.length),
          React.createElement('div',{className:'stat-sub'},'attivi')
        ),
        React.createElement('div',{className:`stat-card ${absPct>75?'danger':''}`},
          React.createElement('div',{className:'stat-label'},'Ore Assenza'),
          React.createElement('div',{className:'stat-value'},fmtMin(totalAbsMin)),
          React.createElement('div',{className:'stat-sub'},`${Math.max(0,200-totalAbsH).toFixed(1)}h rimanenti`)
        ),
        React.createElement('div',{className:'stat-card'},
          React.createElement('div',{className:'stat-label'},'Voti totali'),
          React.createElement('div',{className:'stat-value'},data.modules.reduce((s,m)=>s+(m.grades||[]).length,0)),
          React.createElement('div',{className:'stat-sub'},'inseriti')
        )
      ),
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-title'},'Soglia Assenze (max 200 ore)'),
        React.createElement('div',{style:{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}},
          React.createElement('span',{style:{fontSize:22,color:absPct>75?'var(--danger)':'var(--accent)'}},fmtMin(totalAbsMin)),
          React.createElement('span',{style:{fontSize:12,color:'var(--text3)'}},`/ 200h  (${absPct.toFixed(1)}%)`)
        ),
        React.createElement('div',{className:'progress-bar'},
          React.createElement('div',{className:`progress-fill ${absPct>75?'danger':''}`,style:{width:absPct+'%'}})
        ),
        absPct>75 && React.createElement('div',{style:{fontSize:11,color:'var(--danger)',marginTop:4}},'⚠ Hai superato il 75% del limite assenze')
      ),
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-title'},'Riepilogo Moduli'),
        data.modules.length===0
          ? React.createElement('div',{className:'empty-state'},React.createElement('p',null,'Nessun modulo. Aggiungine uno dalla barra laterale.'))
          : data.modules.map(m=>{
              const avg=calcAvg(m.grades);
              return React.createElement('div',{key:m.id,style:{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',marginBottom:8},onClick:()=>setView(m.id)},
                React.createElement('span',{style:{flex:1,fontSize:13}},m.name),
                React.createElement('span',{style:{fontSize:11,color:'var(--text3)'}},`${(m.grades||[]).length} voti`),
                React.createElement('span',{className:`grade-badge ${gradeClass(avg)}`,style:{width:'auto',padding:'4px 10px',borderRadius:6,fontSize:13}},fmtAvg(avg))
              );
            })
      )
    );
  }

  // ── ABSENCES ─────────────────────────────────────────────
  function AbsencesView() {
    const sorted=[...data.absences].sort((a,b)=>b.date.localeCompare(a.date));
    const typeName=t=>t==='full'?'Intera':t==='half'?'Mezza':'Custom';
    return React.createElement('div',null,
      React.createElement('div',{className:'page-header'},
        React.createElement('div',null,
          React.createElement('h2',{className:'page-title'},'Assenze'),
          React.createElement('p',{className:'page-subtitle'},`${fmtMin(totalAbsMin)} totali su 200h massime`)
        ),
        React.createElement('button',{className:'btn btn-primary',onClick:()=>setModal('addAbsence')},'+ Aggiungi')
      ),
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-title'},'Progresso'),
        React.createElement('div',{style:{display:'flex',gap:8,alignItems:'baseline',marginBottom:6}},
          React.createElement('span',{style:{fontSize:28,fontWeight:300,color:absPct>75?'var(--danger)':'var(--accent)'}},fmtMin(totalAbsMin)),
          React.createElement('span',{style:{fontSize:12,color:'var(--text3)'}},'/ 200h')
        ),
        React.createElement('div',{className:'progress-bar',style:{height:8}},
          React.createElement('div',{className:`progress-fill ${absPct>75?'danger':''}`,style:{width:absPct+'%'}})
        ),
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--text3)',marginTop:4}},
          React.createElement('span',null,`${absPct.toFixed(1)}% usato`),
          React.createElement('span',null,`Rimangono ${fmtMin(Math.max(0,200*60-totalAbsMin))}`)
        )
      ),
      sorted.length===0
        ? React.createElement('div',{className:'empty-state'},React.createElement('p',null,'Nessuna assenza registrata.'))
        : sorted.map(a=>React.createElement('div',{key:a.id,className:'absence-row'},
            React.createElement('span',{className:'absence-type'},typeName(a.type)),
            React.createElement('span',{style:{flex:1}},
              React.createElement('div',{style:{fontSize:12,color:'var(--text)'}},a.date),
              a.note&&React.createElement('div',{style:{fontSize:11,color:'var(--text3)'}},a.note)
            ),
            React.createElement('span',{style:{fontSize:16,fontWeight:300,color:'var(--text)',minWidth:50,textAlign:'right'}},fmtMin(a.minutes)),
            React.createElement('button',{className:'grade-delete',onClick:()=>deleteAbsence(a.id)},
              React.createElement(Icon,{d:I.trash,size:14})
            )
          ))
    );
  }

  // ── MODULE ────────────────────────────────────────────────
  function ModuleView({mod}) {
    const avg=calcAvg(mod.grades);
    const sorted=[...(mod.grades||[])].sort((a,b)=>b.date.localeCompare(a.date));
    return React.createElement('div',null,
      React.createElement('div',{className:'page-header'},
        React.createElement('div',null,
          React.createElement('h2',{className:'page-title'},mod.name),
          React.createElement('p',{className:'page-subtitle'},`${(mod.grades||[]).length} voti`)
        ),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>{setPendingDel(mod.id);setModal('delModule');}},
            React.createElement(Icon,{d:I.trash,size:13})
          ),
          React.createElement('button',{className:'btn btn-primary',onClick:()=>{setGradeVal('');setGradeDesc('');setGradeDate(new Date().toISOString().slice(0,10));setModal('addGrade');}},'+ Voto')
        )
      ),
      React.createElement('div',{className:'card',style:avg!==null?{borderColor:avg>=6?'rgba(109,184,138,0.3)':'rgba(224,92,92,0.3)'}:{}},
        React.createElement('div',{className:'card-title'},'Media del Modulo'),
        React.createElement('div',{className:'avg-display'},
          React.createElement('span',{className:'big',style:{color:avg===null?'var(--text3)':avg>=7?'var(--success)':avg>=6?'var(--accent)':'var(--danger)'}},fmtAvg(avg)),
          avg!==null&&React.createElement('span',{className:'small'},'/ 10')
        )
      ),
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-title'},'Voti'),
        sorted.length===0
          ? React.createElement('div',{className:'empty-state'},React.createElement('p',null,'Nessun voto. Premi "+ Voto" per aggiungere.'))
          : React.createElement('div',{className:'grades-list'},
              ...sorted.map(g=>React.createElement('div',{key:g.id,className:'grade-row'},
                React.createElement('span',{className:`grade-badge ${gradeClass(g.value)}`},g.value),
                React.createElement('div',{className:'grade-row-info'},
                  React.createElement('div',{className:'grade-row-desc'},g.desc||'Voto'),
                  React.createElement('div',{className:'grade-row-date'},g.date)
                ),
                React.createElement('button',{className:'grade-delete',onClick:()=>deleteGrade(mod.id,g.id)},
                  React.createElement(Icon,{d:I.trash,size:14})
                )
              ))
            )
      )
    );
  }

  // ── MODALS ────────────────────────────────────────────────
  function Modals() {
    if (!modal) return null;
    const O = ch => React.createElement('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget){setModal(null);setPendingDel(null);}}},ch);

    if (modal==='addModule') return O(React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-title'},'Nuovo Modulo'),
      React.createElement('div',{className:'form-group',style:{marginBottom:0}},
        React.createElement('label',null,'Nome'),
        React.createElement('input',{type:'text',value:modName,placeholder:'es. Matematica',onChange:e=>setModName(e.target.value),onKeyDown:e=>e.key==='Enter'&&addModule(),style:{width:'100%'},autoFocus:true})
      ),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setModal(null)},'Annulla'),
        React.createElement('button',{className:'btn btn-primary',onClick:addModule},'Crea')
      )
    ));

    if (modal==='addGrade') return O(React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-title'},'Aggiungi Voto'),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        React.createElement('div',{className:'form-row'},
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Voto (1-100)'),
            React.createElement('input',{type:'number',min:1,max:100,step:1,value:gradeVal,onChange:e=>setGradeVal(e.target.value),autoFocus:true,style:{width:90}})
          ),
          React.createElement('div',{className:'form-group',style:{flex:1}},
            React.createElement('label',null,'Data'),
            React.createElement('input',{type:'date',value:gradeDate,onChange:e=>setGradeDate(e.target.value)})
          )
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Descrizione (opzionale)'),
          React.createElement('input',{type:'text',value:gradeDesc,placeholder:'es. Verifica capitolo 3',onChange:e=>setGradeDesc(e.target.value),style:{width:'100%'},onKeyDown:e=>e.key==='Enter'&&addGrade()})
        )
      ),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setModal(null)},'Annulla'),
        React.createElement('button',{className:'btn btn-primary',onClick:addGrade},'Aggiungi')
      )
    ));

    if (modal==='addAbsence') return O(React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-title'},'Registra Assenza'),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        React.createElement('div',{className:'form-row'},
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Tipo'),
            React.createElement('select',{value:absType,onChange:e=>setAbsType(e.target.value)},
              React.createElement('option',{value:'full'},'Giornata intera (8h)'),
              React.createElement('option',{value:'half'},'Mezza giornata (4h)'),
              React.createElement('option',{value:'custom'},'Personalizzato')
            )
          ),
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Data'),
            React.createElement('input',{type:'date',value:absDate,onChange:e=>setAbsDate(e.target.value)})
          )
        ),
        absType==='custom'&&React.createElement('div',{className:'form-row'},
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Ore'),
            React.createElement('input',{type:'number',min:0,max:24,value:absH,onChange:e=>setAbsH(e.target.value),placeholder:'0'})
          ),
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Minuti'),
            React.createElement('input',{type:'number',min:0,max:59,value:absM,onChange:e=>setAbsM(e.target.value),placeholder:'0'})
          )
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Note (opzionale)'),
          React.createElement('input',{type:'text',value:absNote,placeholder:'es. Malattia',onChange:e=>setAbsNote(e.target.value),style:{width:'100%'}})
        )
      ),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setModal(null)},'Annulla'),
        React.createElement('button',{className:'btn btn-primary',onClick:addAbsence},'Registra')
      )
    ));

    if (modal==='delModule') return O(React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-title'},'Elimina Modulo'),
      React.createElement('p',{style:{color:'var(--text2)',fontSize:13}},'Elimina il modulo e tutti i suoi voti. Operazione irreversibile.'),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>{setModal(null);setPendingDel(null);}},'Annulla'),
        React.createElement('button',{className:'btn btn-danger',onClick:()=>deleteModule(pendingDel)},'Elimina')
      )
    ));

    if (modal==='dbSettings') return O(React.createElement('div',{className:'modal'},
      React.createElement('div',{className:'modal-title'},'Database'),
      React.createElement('p',{className:'modal-subtitle'},
        dbStatus==='connected'
          ? '🟢 Connesso a Firebase Firestore. I dati si sincronizzano in tempo reale su tutti i dispositivi.'
          : '🔴 Modalità locale — i dati vengono salvati solo in questo browser.'
      ),
      React.createElement('div',{className:'modal-actions'},
        React.createElement('button',{className:'btn btn-ghost',onClick:()=>setModal(null)},'Chiudi'),
        dbStatus==='connected'
          ? React.createElement('button',{className:'btn btn-danger',onClick:()=>{disconnectFirebase();setModal(null);}},'Disconnetti')
          : React.createElement('button',{className:'btn btn-primary',onClick:()=>{setModal(null);setShowSetup(true);}},'Configura Firebase')
      )
    ));

    return null;
  }

  // ── RENDER ────────────────────────────────────────────────
  if (showSetup) return React.createElement(React.Fragment,null,
    React.createElement(SetupScreen,{onSave:handleSetupSave,onSkip:()=>setShowSetup(false)}),
    toast&&React.createElement(Toast,{msg:toast,onDone:()=>setToast(null)})
  );

  return React.createElement('div',{className:'app'},
    React.createElement(Sidebar),
    React.createElement('main',{className:'main'},
      view==='home'     ? React.createElement(HomeView) :
      view==='absences' ? React.createElement(AbsencesView) :
      currentMod        ? React.createElement(ModuleView,{mod:currentMod}) :
      React.createElement('div',null,'Vista non trovata')
    ),
    React.createElement(Modals),
    toast&&React.createElement(Toast,{msg:toast,onDone:()=>setToast(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
